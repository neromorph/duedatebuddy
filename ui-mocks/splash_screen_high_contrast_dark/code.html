<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
        }

        @keyframes subtle-pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.9;
            }
        }

        @keyframes ripple {
            0% {
                transform: scale(0.8);
                opacity: 0.4;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .pulse-effect {
            animation: subtle-pulse 3s ease-in-out infinite;
        }

        .ripple-layer {
            position: absolute;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: ripple 4s cubic-bezier(0, 0.2, 0.8, 1) infinite;
        }

        .ripple-2 {
            animation-delay: 2s;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#000000",
                        "primary": "#FFFFFF",
                        "on-primary": "#000000",
                        "surface": "#000000",
                        "surface-container-highest": "#1A1A1A",
                        "on-background": "#FFFFFF"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-black overflow-hidden text-white">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex items-center justify-center overflow-hidden bg-black">
<!-- Ambient Background Glow (Subtle for contrast) -->
<div class="absolute inset-0 bg-black overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-white/5 rounded-full blur-[120px]"></div>
</div>
<!-- Animation Layer -->
<div class="relative flex items-center justify-center w-64 h-64">
<!-- Ripple Effects -->
<div class="ripple-layer w-48 h-48"></div>
<div class="ripple-layer ripple-2 w-48 h-48"></div>
<!-- Central Icon Branding -->
<div class="pulse-effect relative z-10 flex flex-col items-center justify-center w-32 h-32 bg-white rounded-[32px] shadow-[0_0_40px_rgba(255,255,255,0.2)]">
<span class="material-symbols-outlined text-black !text-6xl" data-icon="inventory_2" style="font-variation-settings: 'FILL' 1;">
                    inventory_2
                </span>
</div>
</div>
<!-- Lower Loading Bar -->
<div class="absolute bottom-16 left-1/2 -translate-x-1/2 w-48 h-1 bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-white w-0 transition-all duration-[3000ms] ease-out rounded-full shadow-[0_0_8px_rgba(255,255,255,0.5)]" id="progress-bar"></div>
</div>
</main>
<script>
        // Micro-interaction for the progress bar
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progress-bar');
            setTimeout(() => {
                bar.style.width = '100%';
            }, 100);
        });
    </script>
</body></html>
