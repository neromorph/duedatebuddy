<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DueDateBuddy · Masuk Android</title>
<style>
:root{--bg:oklch(98% .004 240);--surface:oklch(100% 0 0);--surface-2:oklch(96% .006 240);--fg:oklch(20% .02 240);--muted:oklch(50% .018 240);--border:oklch(90% .006 240);--accent:oklch(56% .12 170);--danger:oklch(61% .18 28);--focus:oklch(67% .16 170);--font-display:'Google Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;--font-body:'Google Sans Text',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;--font-mono:'Roboto Mono',ui-monospace,monospace}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--surface-2);font-family:var(--font-body);color:var(--fg)}button,input,a{font:inherit}button{cursor:pointer;-webkit-tap-highlight-color:transparent}button:focus-visible,input:focus-visible,a:focus-visible{outline:3px solid var(--focus);outline-offset:3px}.phone{width:min(412px,100vw);height:min(900px,100vh);border-radius:36px;background:var(--fg);padding:10px;box-shadow:0 32px 80px color-mix(in oklch,var(--fg) 22%,transparent)}.screen{height:100%;border-radius:28px;background:var(--bg);overflow:hidden;position:relative}.camera{position:absolute;top:16px;left:50%;translate:-50% 0;width:12px;height:12px;border-radius:50%;background:var(--fg);z-index:3}.status{height:48px;padding:15px 24px 0;display:flex;justify-content:space-between;font:700 12px var(--font-mono);letter-spacing:.01em}.login{height:calc(100% - 72px);padding:88px 28px 32px;display:flex;flex-direction:column;justify-content:center}.brand{display:grid;justify-items:start;gap:18px;margin-bottom:40px}.logo{width:64px;height:64px;border-radius:20px;background:var(--fg);display:grid;place-items:center;box-shadow:0 14px 34px color-mix(in oklch,var(--fg) 13%,transparent)}.orbit{width:36px;height:36px;border-radius:50%;border:4px solid var(--accent);border-top-color:var(--surface);position:relative}.orbit:after{content:'';position:absolute;inset:9px;border-radius:50%;background:var(--accent)}h1{font:850 38px/1 var(--font-display);letter-spacing:-.04em;margin:0}.form{display:grid;gap:15px}.field{display:grid;gap:8px}label{font-size:13px;font-weight:850;letter-spacing:.01em}.input{height:58px;border:1px solid var(--border);border-radius:18px;background:var(--surface);padding:0 15px;display:flex;align-items:center;gap:8px;transition:border-color .15s ease,box-shadow .15s ease}.input:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px color-mix(in oklch,var(--accent) 15%,transparent)}input{width:100%;border:0;outline:0;background:transparent;color:var(--fg);min-width:0;font-size:16px}input::placeholder{color:color-mix(in oklch,var(--muted) 72%,transparent)}.toggle{min-width:44px;height:44px;border:0;border-radius:14px;background:transparent;color:var(--muted);font-size:13px;font-weight:850}.toggle:active{background:var(--surface-2)}.error{min-height:16px;color:var(--danger);font-size:12px;font-weight:750;opacity:0}.field.invalid .input{border-color:var(--danger);box-shadow:0 0 0 4px color-mix(in oklch,var(--danger) 12%,transparent)}.field.invalid .error{opacity:1}.forgot{justify-self:end;color:var(--accent);font-size:13px;font-weight:850;text-decoration:none;min-height:44px;display:inline-flex;align-items:center}.actions{display:grid;gap:12px;margin-top:4px}.cta{height:58px;border:0;border-radius:29px;background:var(--accent);color:var(--surface);font-weight:900;letter-spacing:.01em;transition:transform .15s ease,filter .15s ease,background .15s ease}.cta:hover{filter:brightness(.98)}.cta:active{transform:translateY(2px) scale(.985)}.cta[disabled]{opacity:.68;cursor:wait}.cta.secondary{background:var(--surface);color:var(--fg);border:1px solid var(--border)}.toast{position:absolute;left:24px;right:24px;bottom:72px;padding:14px 16px;border-radius:18px;background:var(--fg);color:var(--surface);font-size:13px;font-weight:750;text-align:center;opacity:0;transform:translateY(8px);transition:opacity .2s ease,transform .2s ease;pointer-events:none}.toast.show{opacity:1;transform:none}.toast.error{background:color-mix(in oklch,var(--danger) 84%,var(--fg))}.sysnav{position:absolute;bottom:0;left:0;right:0;height:24px;background:var(--surface);display:flex;justify-content:center;gap:34px;align-items:center}.sysnav span{width:18px;height:3px;border-radius:9px;background:var(--fg);opacity:.7}.sysnav span:nth-child(2){width:16px;height:16px;border-radius:50%;background:transparent;border:2px solid var(--fg)}@media(max-height:760px){.login{padding-top:58px;justify-content:flex-start}.brand{margin-bottom:28px}.logo{width:56px;height:56px}.orbit{width:32px;height:32px}h1{font-size:34px}}@media(max-width:360px){.login{padding-inline:22px}.phone{border-radius:0;padding:0}.screen{border-radius:0}}@media (prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="phone" data-od-id="android-login-phone">
  <div class="screen">
    <div class="camera" aria-hidden="true"></div>
    <div class="status" aria-hidden="true"><span>9:41</span><span>LTE 87%</span></div>
    <section class="login" data-od-id="android-login-screen" aria-labelledby="login-title">
      <div class="brand" data-od-id="android-login-brand">
        <div class="logo" aria-hidden="true"><div class="orbit"></div></div>
        <h1 id="login-title" data-od-id="android-login-title">Masuk</h1>
      </div>
      <form class="form" data-od-id="android-login-form" novalidate>
        <div class="field" id="email-field">
          <label for="email">Email</label>
          <div class="input"><input id="email" type="email" autocomplete="email" placeholder="nama@email.com" aria-describedby="email-error" inputmode="email"></div>
          <div class="error" id="email-error">Email tidak valid.</div>
        </div>
        <div class="field" id="password-field">
          <label for="password">Kata sandi</label>
          <div class="input"><input id="password" type="password" autocomplete="current-password" placeholder="Kata sandi" aria-describedby="password-error"><button class="toggle" type="button" aria-controls="password" aria-label="Tampilkan kata sandi">Lihat</button></div>
          <div class="error" id="password-error">Kata sandi wajib diisi.</div>
        </div>
        <a class="forgot" href="#" data-od-id="android-forgot-password">Lupa kata sandi?</a>
        <div class="actions">
          <button class="cta" data-od-id="android-login-submit">Masuk</button>
          <button class="cta secondary" type="button" data-od-id="android-signup-button">Daftar</button>
        </div>
      </form>
    </section>
    <div class="toast" role="status" aria-live="polite" id="toast">Memproses…</div>
    <div class="sysnav" aria-hidden="true"><span></span><span></span><span></span></div>
  </div>
</main>
<script>
const form=document.querySelector('form');
const email=document.getElementById('email');
const password=document.getElementById('password');
const toast=document.getElementById('toast');
const submit=document.querySelector('[data-od-id="android-login-submit"]');
const toggle=document.querySelector('.toggle');
function showToast(text,isError=false){toast.textContent=text;toast.classList.toggle('error',isError);toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1700)}
function validEmail(value){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)}
function setInvalid(field,input,invalid){field.classList.toggle('invalid',invalid);input.setAttribute('aria-invalid',invalid?'true':'false')}
form.addEventListener('submit',event=>{event.preventDefault();const emailOk=validEmail(email.value.trim());const passwordOk=password.value.trim().length>0;setInvalid(document.getElementById('email-field'),email,!emailOk);setInvalid(document.getElementById('password-field'),password,!passwordOk);if(!emailOk||!passwordOk){showToast('Periksa email dan kata sandi.',true);return}submit.disabled=true;submit.textContent='Memproses…';showToast('Memproses…');setTimeout(()=>{submit.disabled=false;submit.textContent='Masuk';showToast('Berhasil masuk.')},850)});
toggle.addEventListener('click',()=>{const visible=password.type==='text';password.type=visible?'password':'text';toggle.textContent=visible?'Lihat':'Sembunyi';toggle.setAttribute('aria-label',visible?'Tampilkan kata sandi':'Sembunyikan kata sandi');password.focus()});
document.querySelector('[data-od-id="android-forgot-password"]').addEventListener('click',event=>{event.preventDefault();showToast('Tautan reset dikirim.')});
document.querySelector('[data-od-id="android-signup-button"]').addEventListener('click',()=>showToast('Buka halaman daftar.'));
</script>
</body>
</html>
