<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>

                    "on-tertiary-container": "#000000",
                    "tertiary-fixed": "#FFFFFF",
                    "error-container": "#93000a",

                    "on-surface-variant": "#FFFFFF",
                    "on-tertiary": "#000000",
                    "on-secondary-fixed-variant": "#FFFFFF",
                    "on-secondary-container": "#FFFFFF",
                    "secondary": "#FFFFFF",
                    "on-background": "#FFFFFF",
                    "primary-fixed": "#FFFFFF",
                    "background": "#000000",
                    "on-secondary": "#000000",
                    "on-error-container": "#ffdad6",
                    "tertiary": "#FFFFFF",
                    "surface-bright": "#1A1A1A",
                    "on-primary": "#000000",

                    "secondary-fixed": "#FFFFFF",

            },
            "borderRadius": {

            "spacing": {

                    "stack-lg": "24px",
                    "margin-mobile": "16px",
                    "base": "8px",

                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-lg": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"],
                    "title-md": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "label-md": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "label-lg": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],

                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],

                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "500"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .step-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            min-height: max(884px, 100dvh);
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col">
<header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md flex items-center justify-between px-4 h-16 border-b border-white/20">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors active:scale-95 duration-100" onclick="window.history.back()">
<span class="material-symbols-outlined text-white" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-white">Setup Keluarga</h1>
<div class="w-10"></div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-4 pt-20 pb-12 max-w-4xl mx-auto w-full">
<!-- Hero Section -->
<div class="text-center mb-12">
<div class="w-24 h-24 bg-white rounded-[24px] flex items-center justify-center mx-auto mb-6 shadow-lg">
<span class="material-symbols-outlined text-black text-[48px]" data-icon="family_history" style="font-variation-settings: 'FILL' 1;">family_history</span>
</div>
<h2 class="font-headline-lg-mobile md:font-headline-lg text-white mb-3">Selamat Datang</h2>
<p class="font-body-lg text-white/70 max-w-md mx-auto">Kelola aset berharga keluarga Anda dalam satu tempat yang aman dan terorganisir.</p>
</div>
<!-- Selection Container -->
<div class="w-full grid grid-cols-1 md:grid-cols-2 gap-6 step-transition opacity-100 scale-100" id="selection-view">
<!-- Option 1: Create -->
<button class="group p-8 bg-black rounded-[24px] flex flex-col items-center text-center hover:bg-white/5 transition-all duration-300 border-2 border-white/40 hover:border-white active:scale-95" onclick="showStep('create-step')">
<div class="w-16 h-16 bg-white/10 rounded-[16px] flex items-center justify-center mb-6 border border-white/20 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-white text-[32px]" data-icon="group_add">group_add</span>
</div>
<h3 class="font-headline-md text-white mb-2">Buat Grup Keluarga Baru</h3>
<p class="font-body-md text-white/60">Mulai sebagai admin dan undang anggota keluarga lainnya nanti.</p>
</button>
<!-- Option 2: Join -->
<button class="group p-8 bg-black rounded-[24px] flex flex-col items-center text-center hover:bg-white/5 transition-all duration-300 border-2 border-white/40 hover:border-white active:scale-95" onclick="showStep('join-step')">
<div class="w-16 h-16 bg-white/10 rounded-[16px] flex items-center justify-center mb-6 border border-white/20 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-white text-[32px]" data-icon="key">key</span>
</div>
<h3 class="font-headline-md text-white mb-2">Gabung dengan Kode</h3>
<p class="font-body-md text-white/60">Sudah punya kode undangan? Masukkan kode di sini untuk bergabung.</p>
</button>
</div>
<!-- Step: Create Family Name -->
<div class="hidden w-full max-w-md step-transition opacity-0 translate-y-8" id="create-step">
<div class="bg-black p-8 rounded-[24px] border-2 border-white shadow-[0_0_20px_rgba(255,255,255,0.1)]">
<h3 class="font-headline-md text-white mb-2">Nama Keluarga</h3>
<p class="font-body-md text-white/60 mb-8">Berikan identitas unik untuk grup aset keluarga Anda.</p>
<div class="space-y-6">
<div class="relative">
<label class="absolute -top-2.5 left-3 px-1 bg-black text-label-sm text-white font-label-lg">Nama Grup</label>
<input class="w-full px-4 py-4 rounded-lg border-2 border-white/40 focus:border-white focus:ring-0 focus:outline-none text-body-lg font-body-lg bg-transparent text-white transition-all" placeholder="Contoh: Keluarga Wijaya" type="text"/>
</div>
<button class="w-full py-4 bg-white text-black rounded-[12px] font-bold text-lg hover:bg-white/90 active:scale-95 transition-all shadow-lg">
                    Konfirmasi &amp; Lanjutkan
                </button>
<button class="w-full py-2 text-white font-label-lg text-label-lg hover:underline transition-all" onclick="showStep('selection-view')">
                    Kembali
                </button>
</div>
</div>
</div>
<!-- Step: Join with Code -->
<div class="hidden w-full max-w-md step-transition opacity-0 translate-y-8" id="join-step">
<div class="bg-black p-8 rounded-[24px] border-2 border-white shadow-[0_0_20px_rgba(255,255,255,0.1)]">
<h3 class="font-headline-md text-white mb-2">Masukkan Kode</h3>
<p class="font-body-md text-white/60 mb-8">Masukkan 6 karakter kode yang dikirimkan oleh admin keluarga Anda.</p>
<div class="space-y-8">
<div class="flex justify-between gap-2" id="otp-container">
<input class="w-12 h-14 text-center border-2 border-white/40 rounded-lg font-headline-md text-headline-md focus:border-white focus:ring-0 uppercase bg-white/5 text-white" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center border-2 border-white/40 rounded-lg font-headline-md text-headline-md focus:border-white focus:ring-0 uppercase bg-white/5 text-white" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center border-2 border-white/40 rounded-lg font-headline-md text-headline-md focus:border-white focus:ring-0 uppercase bg-white/5 text-white" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center border-2 border-white/40 rounded-lg font-headline-md text-headline-md focus:border-white focus:ring-0 uppercase bg-white/5 text-white" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center border-2 border-white/40 rounded-lg font-headline-md text-headline-md focus:border-white focus:ring-0 uppercase bg-white/5 text-white" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center border-2 border-white/40 rounded-lg font-headline-md text-headline-md focus:border-white focus:ring-0 uppercase bg-white/5 text-white" maxlength="1" type="text"/>
</div>
<button class="w-full py-4 bg-white text-black rounded-[12px] font-bold text-lg hover:bg-white/90 active:scale-95 transition-all shadow-lg">
                    Bergabung Sekarang
                </button>
<button class="w-full py-2 text-white font-label-lg text-label-lg hover:underline transition-all" onclick="showStep('selection-view')">
                    Kembali
                </button>
</div>
</div>
</div>
</main>
<script>
    function showStep(stepId) {
        const steps = ['selection-view', 'create-step', 'join-step'];
        
        steps.forEach(id => {
            const el = document.getElementById(id);
            if (id === stepId) {
                el.classList.remove('hidden');
                void el.offsetWidth; // Force reflow
                el.classList.add('opacity-100', 'scale-100');
                el.classList.remove('opacity-0', 'translate-y-8', 'scale-95');
            } else {
                el.classList.add('hidden', 'opacity-0', 'translate-y-8');
                el.classList.remove('opacity-100', 'scale-100');
            }
        });
    }

    const inputs = document.querySelectorAll('#otp-container input');
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });
</script>
</body></html>
