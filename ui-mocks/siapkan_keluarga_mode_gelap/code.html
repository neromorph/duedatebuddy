<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>

<h1 class="font-headline-md text-[20px] text-primary">Setup Keluarga</h1>
<div class="w-10"></div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-4 pt-20 pb-12 max-w-4xl mx-auto w-full">
<!-- Hero Section -->
<div class="text-center mb-12">
<div class="w-24 h-24 bg-primary-container rounded-[24px] flex items-center justify-center mx-auto mb-6 shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-on-primary-container text-[48px]" data-icon="family_history" style="font-variation-settings: 'FILL' 1;">family_history</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-3">Selamat Datang</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">Kelola aset berharga keluarga Anda dalam satu tempat yang aman dan terorganisir.</p>
</div>
<!-- Selection Container -->
<div class="w-full grid grid-cols-1 md:grid-cols-2 gap-6 step-transition opacity-100 scale-100" id="selection-view">
<!-- Option 1: Create -->
<button class="group p-8 bg-surface-container rounded-[24px] flex flex-col items-center text-center hover:bg-surface-container-high transition-all duration-300 border border-outline-variant/10 hover:border-primary/30 active:scale-95 shadow-sm" onclick="showStep('create-step')">
<div class="w-16 h-16 bg-secondary-container rounded-[16px] flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-on-secondary-container text-[32px]" data-icon="group_add">group_add</span>
</div>
<h3 class="font-headline-md text-[18px] text-primary mb-2">Buat Grup Keluarga Baru</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Mulai sebagai admin dan undang anggota keluarga lainnya nanti.</p>
</button>
<!-- Option 2: Join -->
<button class="group p-8 bg-surface-container rounded-[24px] flex flex-col items-center text-center hover:bg-surface-container-high transition-all duration-300 border border-outline-variant/10 hover:border-primary/30 active:scale-95 shadow-sm" onclick="showStep('join-step')">
<div class="w-16 h-16 bg-secondary-container rounded-[16px] flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-on-secondary-container text-[32px]" data-icon="key">key</span>
</div>
<h3 class="font-headline-md text-[18px] text-primary mb-2">Gabung dengan Kode</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Sudah punya kode undangan? Masukkan kode di sini untuk bergabung.</p>
</button>
</div>
<!-- Step: Create Family Name -->
<div class="hidden w-full max-w-md step-transition opacity-0 translate-y-8" id="create-step">
<div class="bg-surface-container-low p-8 rounded-[24px] shadow-xl border border-outline-variant/20">
<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Nama Keluarga</h3>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">Berikan identitas unik untuk grup aset keluarga Anda.</p>
<div class="space-y-6">
<div class="relative">
<label class="absolute -top-2.5 left-3 px-1 bg-surface-container-low text-label-sm text-primary font-label-lg">Nama Grup</label>
<input class="w-full px-4 py-4 rounded-lg border-2 border-primary/50 focus:border-primary focus:ring-0 focus:outline-none text-body-lg font-body-lg bg-transparent text-on-surface transition-all" placeholder="Contoh: Keluarga Wijaya" type="text"/>
</div>
<button class="w-full py-4 bg-primary text-on-primary rounded-[12px] font-label-lg text-lg hover:brightness-110 active:scale-95 transition-all shadow-md shadow-primary/20">

                    </button>

</div>

<input class="w-12 h-14 text-center border-2 border-outline-variant rounded-lg font-headline-md text-headline-md focus:border-primary focus:ring-0 uppercase bg-surface-container-high text-on-surface" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center border-2 border-outline-variant rounded-lg font-headline-md text-headline-md focus:border-primary focus:ring-0 uppercase bg-surface-container-high text-on-surface" maxlength="1" type="text"/>

<button class="w-full py-2 text-primary font-label-lg text-label-lg hover:underline transition-all" onclick="showStep('selection-view')">
                        Kembali

<script>
        function showStep(stepId) {
            const steps = ['selection-view', 'create-step', 'join-step'];
            
            steps.forEach(id => {
                const el = document.getElementById(id);
                if (id === stepId) {
                    el.classList.remove('hidden');
                    // Trigger reflow for transition
                    void el.offsetWidth;
                    el.classList.add('opacity-100', 'scale-100');
                    el.classList.remove('opacity-0', 'translate-y-8', 'scale-95');
                } else {
                    el.classList.add('hidden', 'opacity-0', 'translate-y-8');
                    el.classList.remove('opacity-100', 'scale-100');
                }
            });
        }

        // Simple OTP Focus behavior
        const inputs = document.querySelectorAll('#otp-container input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
