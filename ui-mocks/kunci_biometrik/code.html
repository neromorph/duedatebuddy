<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .lock-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            background: rgba(248, 250, 250, 0.7);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Top App Bar (Suppressed Shell as per UX goal for Transactional/Secure state) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-surface">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-headline-sm text-headline-sm text-primary">Asset Tracker</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">help_outline</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile relative">
<!-- Decorative Background Element -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-3xl"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[60%] h-[60%] rounded-full bg-secondary/5 blur-3xl"></div>
</div>
<div class="z-10 w-full max-w-md flex flex-col items-center text-center">
<!-- Lock Icon Section -->
<div class="relative mb-10">
<div class="absolute inset-0 bg-primary/10 rounded-full scale-150 blur-2xl"></div>
<div class="w-32 h-32 md:w-40 md:h-40 bg-surface-container rounded-[32px] flex items-center justify-center shadow-lg relative z-10 lock-pulse border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-7xl md:text-8xl" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
</div>
<div class="absolute -bottom-2 -right-2 w-12 h-12 bg-status-active rounded-full flex items-center justify-center border-4 border-background z-20">
<span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
</div>
<!-- Text Content -->
<div class="space-y-4 mb-12">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">
                    Keamanan Terjaga
                </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                    Akses aset Anda dengan aman menggunakan autentikasi biometrik perangkat Anda.
                </p>
</div>
<!-- Action Cluster -->
<div class="w-full space-y-4 px-4">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-title-md text-title-md flex items-center justify-center gap-3 shadow-md hover:brightness-110 active:scale-95 transition-all" id="biometricBtn">
<span class="material-symbols-outlined">fingerprint</span>
                    Buka dengan Biometrik
                </button>
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-md text-label-md text-outline">Atau gunakan</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant bg-surface-container-low hover:bg-surface-container transition-colors active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2 group-hover:scale-110 transition-transform">password</span>
<span class="font-label-lg text-label-lg text-on-surface">PIN</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant bg-surface-container-low hover:bg-surface-container transition-colors active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2 group-hover:scale-110 transition-transform">lock</span>
<span class="font-label-lg text-label-lg text-on-surface">Password</span>
</button>
</div>
</div>
</div>
</main>
<!-- Success Modal (Hidden by default) -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300" id="successModal">
<div class="bg-surface-container-lowest w-full max-w-xs rounded-3xl p-8 flex flex-col items-center text-center shadow-2xl transform scale-90 transition-transform duration-300">
<div class="w-20 h-20 bg-status-active/10 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-status-active text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-2">Berhasil</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Identitas terverifikasi. Membuka dashboard...</p>
</div>
</div>
<!-- Background Image Illustration (Subtle) -->
<div class="fixed bottom-0 left-0 w-full h-1/3 z-[-1] opacity-20 pointer-events-none">
<img alt="security pattern" class="w-full h-full object-cover grayscale" data-alt="A highly detailed 3D abstract digital background consisting of interconnected glowing lines and nodes resembling a secure neural network or blockchain structure. The lighting is low-key with deep teal and charcoal tones, creating a professional and high-tech security atmosphere. Minimalist geometric patterns intersect in a clean, corporate style that emphasizes digital safety and sophisticated modern technology." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDjLU6kW-byM3sPmZP2BPb5gKvNDYBJ9eguQzicqOG00VEAAPlxZhQ-RDHwA86XrEvYXFVIa0UipOQq_brK4agFQolyYVZ4rSFLocq5kZvEdgH_wP_u6grAvD4HTlZVAo6OND6VUeABth_IbeA6ibY2qnaKSwarhTJtkTzB589HACrReYb34URvSa3iGUxPnd69RcUUXUaZ0ocol_xYhIx-iW_MVSha5X6slwg-xiATQz34hyv6Uvy-m8eqU-deCtdN2LYo_wWHEvA"/>
</div>
<script>
        document.getElementById('biometricBtn').addEventListener('click', function() {
            const modal = document.getElementById('successModal');
            const modalContent = modal.querySelector('div');
            
            // Show modal
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-90');
            modalContent.classList.add('scale-100');

            // Simulate navigation after delay
            setTimeout(() => {
                alert('Mengarahkan ke Dashboard...');
                location.reload(); // Placeholder for actual navigation
            }, 2000);
        });

        // Atmospheric Micro-interaction for the lock
        document.addEventListener('mousemove', (e) => {
            const lock = document.querySelector('.lock-pulse');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            lock.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
</body></html>
