<script>
        // Simple micro-interaction for active chip states
        document.querySelectorAll('.overflow-x-auto button').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.overflow-x-auto button').forEach(b => {
                    b.classList.remove('bg-primary', 'text-on-primary');
                    b.classList.add('border', 'border-outline-variant', 'text-on-surface');
                });
                this.classList.add('bg-primary', 'text-on-primary');
                this.classList.remove('border', 'border-outline-variant', 'text-on-surface');
            });
        });

        // Search bar focus effect
        const searchInput = document.querySelector('input[type="text"]');
        searchInput.addEventListener('focus', () => {
            searchInput.parentElement.classList.add('ring-2', 'ring-white/10');
        });
        searchInput.addEventListener('blur', () => {
            searchInput.parentElement.classList.remove('ring-2', 'ring-white/10');
        });
    </script>
